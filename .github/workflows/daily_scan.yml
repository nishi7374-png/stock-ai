name: 毎朝スクリーニング自動実行

on:
  schedule:
    # 毎朝5時に実行（UTC 20:00 = JST 5:00）
    - cron: "0 20 * * 0-4"
  workflow_dispatch:  # 手動でも実行できるようにする

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリのコードを取得
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # 2. Pythonをセットアップ
      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. 必要なライブラリをインストール
      - name: 依存パッケージをインストール
        run: pip install yfinance pandas numpy

      # 4. スキャン実行
      - name: スクリーニングを実行
        run: python scripts/scan.py

      # 5. 結果ファイルをリポジトリにコミット・プッシュ
      - name: 結果をコミットして保存
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scan_today.json scan_prev.json || true
          git diff --staged --quiet || git commit -m "自動スキャン結果を更新 $(date '+%Y/%m/%d %H:%M' -d '+9 hours')"
          git push
